<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Claude-MangoPress</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0f;--surface:#18181b;--surface2:#222226;--border:#2e2e34;
  --accent:#f5c842;--accent2:#e6a800;--text:#f0efe8;--muted:#8a8a94;
  --danger:#e24b4a;--success:#1D9E75;--radius:12px;--radius-sm:8px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
a{color:var(--accent)}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(14,14,15,0.95)}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:20px;font-weight:700;color:var(--text)}
.header-actions{display:flex;align-items:center;gap:10px}
.btn{padding:8px 18px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:inherit}
.btn:hover{background:var(--surface2)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#0e0e0f;border-color:var(--accent);font-weight:600}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-danger{color:var(--danger);border-color:transparent}
.badge{background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:20px;font-size:11px;color:var(--muted)}
main{max-width:860px;margin:0 auto;padding:40px 20px 80px}
.hero{text-align:center;margin-bottom:40px}
.hero h1{font-size:clamp(28px,5vw,46px);line-height:1.2;margin-bottom:10px;font-weight:700}
.hero-accent{color:var(--accent);font-style:italic}
.hero p{color:var(--muted);font-size:15px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
.section-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.field{margin-bottom:18px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px}
.field input,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:14px;padding:10px 14px;outline:none;transition:border-color 0.15s}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:85px;line-height:1.5}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:580px){.grid-2{grid-template-columns:1fr}}
.pill-group{display:flex;flex-wrap:wrap;gap:8px}
.pill{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;font-size:13px;cursor:pointer;transition:all 0.15s}
.pill:hover{border-color:var(--muted);color:var(--text)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#0e0e0f;font-weight:600}
.wc-group{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.wc-btn{padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:all 0.15s}
.wc-btn:hover{border-color:var(--muted);color:var(--text)}
.wc-btn.active{border-color:var(--accent);color:var(--accent);background:var(--surface2)}
.tag-group{display:flex;flex-wrap:wrap;gap:6px}
.tag{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;transition:all 0.15s}
.tag:hover{border-color:var(--muted);color:var(--text)}
.tag.active{border-color:var(--accent);color:var(--accent);background:var(--surface2)}
.generate-btn{width:100%;padding:14px;background:var(--accent);color:#0e0e0f;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:17px;font-weight:700;cursor:pointer;transition:all 0.15s;margin-top:20px}
.generate-btn:hover{background:var(--accent2)}
.generate-btn:disabled{opacity:0.4;cursor:not-allowed}
.loading-overlay{position:fixed;inset:0;background:rgba(14,14,15,0.93);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-title{font-size:22px;font-weight:700}
.loading-status{font-size:14px;color:var(--muted)}
.result-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.result-title{font-size:clamp(20px,3vw,30px);font-weight:700;line-height:1.2;flex:1}
.result-actions{display:flex;gap:8px;flex-wrap:wrap}
.reformat-bar{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0;padding:14px;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border);align-items:center}
.reformat-label{font-size:12px;color:var(--muted);margin-right:4px}
.article-body{line-height:1.8}
.article-body h2{font-size:20px;font-weight:700;margin:24px 0 10px}
.article-body h3{font-size:16px;font-weight:600;margin:18px 0 8px}
.article-body p{margin-bottom:12px;color:#c8c8d0}
.article-body ul,.article-body ol{padding-left:22px;margin-bottom:12px;color:#c8c8d0}
.article-body li{margin-bottom:5px}
.article-body blockquote{border-left:3px solid var(--accent);padding:10px 14px;margin:16px 0;background:var(--surface2);border-radius:0 8px 8px 0;font-style:italic;color:var(--muted)}
.block-wrap{position:relative;padding-right:64px;margin-bottom:12px}
.block-copy{position:absolute;top:2px;right:0;padding:3px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--muted);cursor:pointer;opacity:0;transition:opacity 0.15s;font-family:inherit}
.block-wrap:hover .block-copy{opacity:1}
.export-bar{display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);flex-wrap:wrap}
.seo-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-top:16px}
.seo-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.seo-toggle-title{font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted)}
.seo-content{margin-top:14px;display:grid;gap:10px}
.seo-field{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.seo-field-label{font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.06em}
.seo-field-value{font-size:13px;color:var(--text);flex:1}
.seo-keywords{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.seo-kw{background:var(--surface2);border:1px solid var(--border);padding:3px 9px;border-radius:20px;font-size:12px;color:var(--accent)}
.prompt-panel{margin-top:14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.prompt-toggle{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:12px;color:var(--muted);font-family:inherit;background:transparent;border:none;width:100%;text-align:left}
.prompt-content{padding:0 14px 14px;font-family:monospace;font-size:12px;color:var(--muted);line-height:1.6;white-space:pre-wrap;word-break:break-word}
.template-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.template-row:last-child{border-bottom:none}
.template-name{flex:1;font-size:13px}
.template-meta{font-size:11px;color:var(--muted)}
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s}
.history-item:hover{border-color:var(--muted)}
.history-item-title{font-size:17px;font-weight:600;margin-bottom:6px}
.history-item-meta{display:flex;gap:10px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.history-empty{text-align:center;padding:60px 0;color:var(--muted)}
.tabs{display:flex;gap:4px;background:var(--surface2);padding:4px;border-radius:var(--radius-sm);border:1px solid var(--border)}
.tab{padding:7px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);border:1px solid transparent;background:transparent;font-family:inherit;transition:all 0.15s}
.tab.active{background:var(--surface);color:var(--text);border-color:var(--border)}
.version-tag{font-size:11px;background:var(--surface2);border:1px solid var(--border);padding:3px 8px;border-radius:20px;color:var(--muted);display:inline-block;margin-right:4px;margin-bottom:4px}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.reformatted-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:16px}
.reformatted-box pre{white-space:pre-wrap;word-break:break-word;font-family:inherit;font-size:13px;color:#c8c8d0;line-height:1.7}
.checkbox-row{display:flex;align-items:center;gap:10px;padding-top:8px}
.checkbox-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.checkbox-row label{font-size:13px;color:var(--muted);cursor:pointer}
.api-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 13px;font-size:14px;outline:none;font-family:inherit}
.api-input:focus{border-color:var(--accent)}
.tpl-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-size:13px;outline:none;font-family:inherit}
.tpl-input:focus{border-color:var(--accent)}
.copied-btn{color:var(--success) !important}
.accent-tag{color:var(--accent);border-color:var(--accent)}
</style>
</head>
<body>

<div id="header-area"></div>
<div id="loading-area"></div>
<main id="main-area" style="max-width:860px;margin:0 auto;padding:40px 20px 80px"></main>

<script>
var FIRM_CONTEXT = 'You are a professional content writer for Modern Acre Studio PLLC, an architecture and consulting firm based in Richmond, Texas. The firm handles residential and commercial projects in the Houston metro area. Tailor all articles to reflect AEC industry expertise, Houston/Texas market context, and a licensed architect perspective.';
var TONES = ['Professional','Conversational','Technical','LinkedIn-Optimized'];
var WORD_COUNTS = [300,600,1200,2000];
var PROJECT_TAGS = ['Permitting','Custom Home','Commercial','Code Research','Business Dev','General AEC'];
var PLATFORMS = ['LinkedIn Post','Blog Article','Instagram Caption','Email Newsletter'];

function loadLS(key, def) { try { return JSON.parse(localStorage.getItem(key)) || def; } catch(e) { return def; } }
function saveLS(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }
function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

var state = {
  view: 'create',
  apiKey: loadLS('mp_apikey',''),
  showApiSetup: false,
  form: { topic:'', audience:'', tone:'Professional', wordCount:600, tags:[], firmVoice:true },
  isGenerating: false,
  genStatus: '',
  article: null,
  reformatted: null,
  reformatPlatform: null,
  isReformatting: false,
  seoOpen: false,
  promptOpen: false,
  templates: loadLS('mp_templates',[]),
  templateName: '',
  history: loadLS('mp_history',[]),
  copiedId: null
};

var articleLines = [];

function setState(updates) {
  for (var k in updates) state[k] = updates[k];
  render();
}

function copyText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).catch(function() { fallbackCopy(text); });
  } else { fallbackCopy(text); }
}
function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

function showCopied(id) {
  state.copiedId = id;
  render();
  setTimeout(function() { state.copiedId = null; render(); }, 1500);
}

function exportFile(title, content, ext, mime) {
  var blob = new Blob([content], {type: mime});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = title.replace(/\s+/g,'-').toLowerCase() + '.' + ext;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

async function callGemini(system, prompt) {
  var key = state.apiKey;
  var res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + key, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      contents: [{role:'user', parts:[{text: prompt}]}],
      systemInstruction: {parts:[{text: system}]},
      generationConfig: {temperature: 0.8, maxOutputTokens: 4096}
    })
  });
  if (!res.ok) {
    var e = await res.json();
    throw new Error(e.error ? e.error.message : 'Gemini API error');
  }
  var data = await res.json();
  return data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] ? data.candidates[0].content.parts[0].text : '';
}

function parseResponse(raw) {
  var seoParts = raw.split('---SEO---');
  var articleRaw = seoParts[0].trim();
  var rest = seoParts[1] || '';
  var promptParts = rest.split('---PROMPT---');
  var seoRaw = promptParts[0].trim();
  var promptRaw = (promptParts[1] || '').trim();
  var titleMatch = articleRaw.match(/^TITLE:\s*(.+)/m);
  var title = titleMatch ? titleMatch[1].trim() : 'Untitled';
  var body = articleRaw.replace(/^TITLE:\s*.+\n?/m,'').trim();
  var metaTitleMatch = seoRaw.match(/META_TITLE:\s*(.+)/);
  var metaDescMatch = seoRaw.match(/META_DESC:\s*(.+)/);
  var kwMatch = seoRaw.match(/KEYWORDS:\s*(.+)/);
  return {
    title: title,
    body: body,
    raw: articleRaw,
    seo: {
      metaTitle: metaTitleMatch ? metaTitleMatch[1].trim() : '',
      metaDesc: metaDescMatch ? metaDescMatch[1].trim() : '',
      keywords: kwMatch ? kwMatch[1].split(',').map(function(k){return k.trim();}) : []
    },
    prompt: promptRaw
  };
}

function buildArticleBodyHTML(body) {
  articleLines = body.split('\n');
  var html = '';
  for (var i = 0; i < articleLines.length; i++) {
    var line = articleLines[i];
    if (!line.trim()) continue;
    if (line.indexOf('## ') === 0) {
      html += '<h2>' + esc(line.slice(3)) + '</h2>';
    } else if (line.indexOf('### ') === 0) {
      html += '<h3>' + esc(line.slice(4)) + '</h3>';
    } else if (line.indexOf('> ') === 0) {
      html += '<blockquote>' + esc(line.slice(2)) + '</blockquote>';
    } else {
      html += '<div class="block-wrap"><p>' + esc(line) + '</p><button class="block-copy" onclick="copyLine(' + i + ')">Copy</button></div>';
    }
  }
  return html;
}

window.copyLine = function(i) {
  if (articleLines[i]) {
    copyText(articleLines[i]);
    showCopied('line_' + i);
  }
};

window.doGenerate = async function() {
  if (!state.apiKey) { setState({showApiSetup:true}); return; }
  if (!state.form.topic.trim()) { alert('Please enter a topic.'); return; }
  setState({isGenerating:true, genStatus:'Writing your article with Gemini Flash...', article:null, reformatted:null, reformatPlatform:null});
  try {
    var f = state.form;
    var toneMap = {
      'Professional': 'formal, authoritative, and polished',
      'Conversational': 'friendly, approachable, and easy to read',
      'Technical': 'detailed and precise with industry terminology',
      'LinkedIn-Optimized': 'punchy with a strong hook and short paragraphs optimized for LinkedIn'
    };
    var system = f.firmVoice ? FIRM_CONTEXT : 'You are a professional content writer.';
    var tagLine = f.tags.length ? 'Project Tags: ' + f.tags.join(', ') : '';
    var prompt = 'Write a ' + f.wordCount + '-word article about: "' + f.topic + '"\n'
      + 'Tone: ' + (toneMap[f.tone] || 'professional') + '\n'
      + 'Target Audience: ' + (f.audience || 'general professionals') + '\n'
      + tagLine + '\n\n'
      + 'Format:\n'
      + '- First line must be: TITLE: [your title here]\n'
      + '- Use ## for H2 subheadings\n'
      + '- Use ### for H3 subheadings\n'
      + '- Short paragraphs\n\n'
      + 'After the full article body, add this exact line: ---SEO---\n'
      + 'Then write:\n'
      + 'META_TITLE: (max 60 chars)\n'
      + 'META_DESC: (max 155 chars)\n'
      + 'KEYWORDS: keyword1, keyword2, keyword3, keyword4, keyword5\n\n'
      + 'Then add this exact line: ---PROMPT---\n'
      + 'Then write a short note on how you approached writing this article.';

    var raw = await callGemini(system, prompt);
    var parsed = parseResponse(raw);
    var entry = {
      id: Date.now(),
      title: parsed.title,
      tone: f.tone,
      tags: f.tags.slice(),
      wordCount: f.wordCount,
      date: new Date().toLocaleDateString(),
      article: parsed,
      form: JSON.parse(JSON.stringify(f))
    };
    var updatedHistory = [entry].concat(state.history).slice(0,50);
    saveLS('mp_history', updatedHistory);
    setState({isGenerating:false, genStatus:'', article:parsed, history:updatedHistory});
  } catch(err) {
    setState({isGenerating:false, genStatus:''});
    alert('Error: ' + err.message);
  }
};

window.doReformat = async function(platform) {
  if (!state.article) return;
  setState({isReformatting:true, reformatPlatform:platform});
  try {
    var instructions = {
      'LinkedIn Post': 'Rewrite as a LinkedIn post: strong hook first line, short punchy paragraphs, 150-300 words, end with a question or CTA, add 5 relevant hashtags.',
      'Blog Article': 'Rewrite as a long-form SEO blog article with intro, H2 body sections, and conclusion. 600-800 words.',
      'Instagram Caption': 'Rewrite as an Instagram caption: engaging first line, 80-150 words, conversational, end with CTA, add 10 hashtags.',
      'Email Newsletter': 'Rewrite as an email newsletter. First line must be: SUBJECT: [subject line]. Then greeting, body paragraphs, clear CTA.'
    };
    var result = await callGemini(FIRM_CONTEXT, (instructions[platform] || '') + '\n\nOriginal article:\n' + state.article.raw);
    setState({isReformatting:false, reformatted:{platform:platform, content:result}});
  } catch(err) {
    setState({isReformatting:false});
    alert('Reformat error: ' + err.message);
  }
};

window.saveApiKey = function() {
  var input = document.getElementById('apiKeyInput');
  var k = input ? input.value.trim() : '';
  if (k) {
    saveLS('mp_apikey', k);
    setState({apiKey:k, showApiSetup:false});
  }
};

window.toggleTag = function(tag) {
  var tags = state.form.tags;
  var idx = tags.indexOf(tag);
  if (idx >= 0) tags.splice(idx,1); else tags.push(tag);
  render();
};

window.setTone = function(tone) { state.form.tone = tone; render(); };
window.setWC = function(wc) { state.form.wordCount = wc; render(); };
window.toggleFirmVoice = function() { state.form.firmVoice = !state.form.firmVoice; render(); };
window.toggleSEO = function() { state.seoOpen = !state.seoOpen; render(); };
window.togglePrompt = function() { state.promptOpen = !state.promptOpen; render(); };

window.saveTemplate = function() {
  var input = document.getElementById('tplNameInput');
  var name = input ? input.value.trim() : '';
  if (!name) return;
  var t = {id:Date.now(), name:name, form:JSON.parse(JSON.stringify(state.form))};
  var updated = [t].concat(state.templates);
  saveLS('mp_templates', updated);
  setState({templates:updated, templateName:''});
};

window.loadTemplate = function(id) {
  for (var i=0; i < state.templates.length; i++) {
    if (state.templates[i].id === id) {
      state.form = JSON.parse(JSON.stringify(state.templates[i].form));
      render();
      return;
    }
  }
};

window.deleteTemplate = function(id) {
  var updated = state.templates.filter(function(t){return t.id!==id;});
  saveLS('mp_templates', updated);
  setState({templates:updated});
};

window.loadHistoryArticle = function(id) {
  for (var i=0; i < state.history.length; i++) {
    if (state.history[i].id === id) {
      var entry = state.history[i];
      setState({article:entry.article, form:entry.form || state.form, view:'create', reformatted:null, reformatPlatform:null});
      return;
    }
  }
};

window.doCopyText = function(id, text) {
  copyText(text);
  showCopied(id);
};

window.doExportMD = function() {
  if (state.article) exportFile(state.article.title, '# ' + state.article.title + '\n\n' + state.article.body, 'md', 'text/markdown');
};
window.doExportTXT = function() {
  if (state.article) exportFile(state.article.title, state.article.title + '\n\n' + state.article.body, 'txt', 'text/plain');
};

window.setView = function(v) { setState({view:v}); };
window.newArticle = function() { setState({article:null, reformatted:null, reformatPlatform:null}); };
window.clearReformat = function() { setState({reformatted:null, reformatPlatform:null}); };
window.showApiSetup = function() { setState({showApiSetup:true}); };
window.hideApiSetup = function() { setState({showApiSetup:false}); };
window.removeApiKey = function() {
  if (confirm('Remove saved API key?')) {
    localStorage.removeItem('mp_apikey');
    setState({apiKey:''});
  }
};

function render() {
  var s = state;

  // HEADER
  var headerHTML = '<header>';
  headerHTML += '<div class="logo" onclick="newArticle();setView(\'create\')">&#129387; Claude-MangoPress</div>';
  headerHTML += '<div class="header-actions">';
  headerHTML += '<div class="tabs">';
  headerHTML += '<button class="tab' + (s.view==='create'?' active':'') + '" onclick="setView(\'create\')">Create</button>';
  headerHTML += '<button class="tab' + (s.view==='history'?' active':'') + '" onclick="setView(\'history\')">History (' + s.history.length + ')</button>';
  headerHTML += '</div>';
  if (s.apiKey) {
    headerHTML += '<button class="btn btn-sm" onclick="removeApiKey()">&#128273; Key saved</button>';
  } else {
    headerHTML += '<button class="btn btn-primary btn-sm" onclick="showApiSetup()">Add API Key</button>';
  }
  headerHTML += '<span class="badge">Gemini Flash</span>';
  headerHTML += '</div></header>';
  document.getElementById('header-area').innerHTML = headerHTML;

  // LOADING
  var loadingHTML = '';
  if (s.isGenerating) {
    loadingHTML = '<div class="loading-overlay">';
    loadingHTML += '<div class="spinner"></div>';
    loadingHTML += '<div class="loading-title">Writing Article...</div>';
    loadingHTML += '<div class="loading-status">' + esc(s.genStatus) + '</div>';
    loadingHTML += '</div>';
  }
  document.getElementById('loading-area').innerHTML = loadingHTML;

  // MAIN
  var html = '';

  // API SETUP
  if (s.showApiSetup) {
    html += '<div class="card" style="margin-bottom:20px">';
    html += '<div class="section-label">Gemini API Key</div>';
    html += '<p style="font-size:13px;color:var(--muted);margin-bottom:14px">Get your free key at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a> — 1,500 free requests/day.</p>';
    html += '<div style="display:flex;gap:10px">';
    html += '<input class="api-input" type="password" id="apiKeyInput" placeholder="AIza..."/>';
    html += '<button class="btn btn-primary" onclick="saveApiKey()">Save</button>';
    html += '<button class="btn" onclick="hideApiSetup()">Cancel</button>';
    html += '</div></div>';
  }

  // CREATE VIEW — FORM
  if (s.view === 'create' && !s.article) {
    html += '<div class="hero">';
    html += '<h1>Write articles that <span class="hero-accent">actually</span> sound like you</h1>';
    html += '<p>Powered by Gemini Flash &middot; Pre-loaded with Modern Acre Studio context</p>';
    html += '</div>';

    html += '<div class="card">';
    html += '<div class="section-label">Article Details</div>';
    html += '<div class="field"><label>Topic *</label>';
    html += '<textarea placeholder="e.g. Why Houston homeowners should get a site plan before buying land..." oninput="state.form.topic=this.value">' + esc(s.form.topic) + '</textarea></div>';

    html += '<div class="grid-2">';
    html += '<div class="field"><label>Target Audience</label>';
    html += '<input type="text" placeholder="e.g. homeowners, contractors, developers" value="' + esc(s.form.audience) + '" oninput="state.form.audience=this.value"/></div>';
    html += '<div class="field"><label>Firm Voice</label>';
    html += '<div class="checkbox-row">';
    html += '<input type="checkbox" id="firmVoice" ' + (s.form.firmVoice ? 'checked' : '') + ' onchange="toggleFirmVoice()"/>';
    html += '<label for="firmVoice">Inject Modern Acre Studio context</label>';
    html += '</div></div>';
    html += '</div>';

    html += '<hr class="divider"/>';
    html += '<div class="section-label">Tone &amp; Format</div>';
    html += '<div class="field"><label>Tone</label><div class="pill-group">';
    for (var ti=0; ti < TONES.length; ti++) {
      var t = TONES[ti];
      html += '<button class="pill' + (s.form.tone===t?' active':'') + '" onclick="setTone(\'' + t + '\')">' + t + '</button>';
    }
    html += '</div></div>';

    html += '<div class="field"><label>Word Count</label><div class="wc-group">';
    for (var wi=0; wi < WORD_COUNTS.length; wi++) {
      var w = WORD_COUNTS[wi];
      html += '<button class="wc-btn' + (s.form.wordCount===w?' active':'') + '" onclick="setWC(' + w + ')">' + w + ' words</button>';
    }
    html += '</div></div>';

    html += '<div class="field"><label>Project Tags</label><div class="tag-group">';
    for (var gi=0; gi < PROJECT_TAGS.length; gi++) {
      var tag = PROJECT_TAGS[gi];
      var isActive = s.form.tags.indexOf(tag) >= 0;
      html += '<button class="tag' + (isActive?' active':'') + '" onclick="toggleTag(\'' + tag + '\')">' + tag + '</button>';
    }
    html += '</div></div>';

    var genDisabled = s.isGenerating || !s.form.topic.trim();
    html += '<button class="generate-btn" onclick="doGenerate()" ' + (genDisabled?'disabled':'') + '>&#129387; Generate Article</button>';
    html += '</div>';

    // TEMPLATES
    html += '<div class="card">';
    html += '<div class="section-label">Saved Templates</div>';
    if (s.templates.length === 0) {
      html += '<p style="font-size:13px;color:var(--muted);margin-bottom:14px">No templates yet. Fill out the form above and save it.</p>';
    } else {
      for (var tpi=0; tpi < s.templates.length; tpi++) {
        var tpl = s.templates[tpi];
        html += '<div class="template-row">';
        html += '<span class="template-name">' + esc(tpl.name) + '</span>';
        html += '<span class="template-meta">' + esc(tpl.form.tone) + ' &middot; ' + tpl.form.wordCount + 'w</span>';
        html += '<button class="btn btn-sm" onclick="loadTemplate(' + tpl.id + ')">Load</button>';
        html += '<button class="btn btn-sm btn-danger" onclick="deleteTemplate(' + tpl.id + ')">&#10005;</button>';
        html += '</div>';
      }
    }
    html += '<div style="display:flex;gap:10px;margin-top:14px">';
    html += '<input class="tpl-input" type="text" id="tplNameInput" placeholder="Template name..."/>';
    html += '<button class="btn btn-primary btn-sm" onclick="saveTemplate()">Save Template</button>';
    html += '</div>';
    html += '</div>';
  }

  // ARTICLE RESULT
  if (s.view === 'create' && s.article) {
    var a = s.article;
    var fullText = a.title + '\n\n' + a.body;

    html += '<div class="result-header">';
    html += '<div>';
    html += '<div style="margin-bottom:8px">';
    html += '<span class="version-tag">' + esc(s.form.tone) + '</span>';
    html += '<span class="version-tag">' + s.form.wordCount + 'w</span>';
    for (var rti=0; rti < s.form.tags.length; rti++) {
      html += '<span class="version-tag accent-tag">' + esc(s.form.tags[rti]) + '</span>';
    }
    html += '</div>';
    html += '<div class="result-title">' + esc(a.title) + '</div>';
    html += '</div>';
    html += '<div class="result-actions">';
    var copyAllId = 'copyall';
    html += '<button class="btn' + (s.copiedId===copyAllId?' copied-btn':'') + '" onclick="doCopyText(\'' + copyAllId + '\',document.getElementById(\'full-article-text\').value)">' + (s.copiedId===copyAllId?'Copied!':'Copy All') + '</button>';
    html += '<input type="hidden" id="full-article-text" value="' + esc(fullText) + '"/>';
    html += '<button class="btn btn-primary" onclick="newArticle()">+ New Article</button>';
    html += '</div></div>';

    // REFORMAT BAR
    html += '<div class="reformat-bar">';
    html += '<span class="reformat-label">Reformat for:</span>';
    for (var pi=0; pi < PLATFORMS.length; pi++) {
      var plat = PLATFORMS[pi];
      var isActive = s.reformatPlatform === plat && !s.isReformatting;
      html += '<button class="btn btn-sm' + (isActive?' btn-primary':'') + '" onclick="doReformat(\'' + plat + '\')" ' + (s.isReformatting?'disabled':'') + '>';
      html += (s.isReformatting && s.reformatPlatform===plat) ? 'Working...' : plat;
      html += '</button>';
    }
    html += '</div>';

    // REFORMATTED
    if (s.reformatted) {
      html += '<div class="reformatted-box">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
      html += '<div class="section-label">' + esc(s.reformatted.platform) + '</div>';
      html += '<div style="display:flex;gap:8px">';
      var rfId = 'reformat';
      html += '<button class="btn btn-sm' + (s.copiedId===rfId?' copied-btn':'') + '" onclick="doCopyText(\'' + rfId + '\',document.getElementById(\'reformat-text\').value)">' + (s.copiedId===rfId?'Copied!':'Copy') + '</button>';
      html += '<input type="hidden" id="reformat-text" value="' + esc(s.reformatted.content) + '"/>';
      html += '<button class="btn btn-sm" onclick="clearReformat()">&#10005;</button>';
      html += '</div></div>';
      html += '<pre>' + esc(s.reformatted.content) + '</pre>';
      html += '</div>';
    }

    // ARTICLE BODY
    html += '<div class="card">';
    html += '<div class="article-body">' + buildArticleBodyHTML(a.body) + '</div>';
    html += '<div class="export-bar">';
    html += '<button class="btn btn-sm" onclick="doExportMD()">&#8595; .md</button>';
    html += '<button class="btn btn-sm" onclick="doExportTXT()">&#8595; .txt</button>';
    var ca2 = 'copyall2';
    html += '<button class="btn btn-sm' + (s.copiedId===ca2?' copied-btn':'') + '" onclick="doCopyText(\'' + ca2 + '\',document.getElementById(\'full-article-text2\').value)">' + (s.copiedId===ca2?'Copied!':'Copy Article') + '</button>';
    html += '<input type="hidden" id="full-article-text2" value="' + esc(fullText) + '"/>';
    html += '</div></div>';

    // SEO
    if (a.seo && (a.seo.metaTitle || a.seo.keywords.length)) {
      html += '<div class="seo-block">';
      html += '<div class="seo-toggle" onclick="toggleSEO()">';
      html += '<span class="seo-toggle-title">SEO Metadata</span>';
      html += '<span style="font-size:12px;color:var(--muted)">' + (s.seoOpen?'Hide &#9650;':'Show &#9660;') + '</span>';
      html += '</div>';
      if (s.seoOpen) {
        html += '<div class="seo-content">';
        var seo1 = 'seo1'; var seo2 = 'seo2'; var seo3 = 'seo3';
        html += '<div class="seo-field"><div style="flex:1"><div class="seo-field-label">Meta Title</div><div class="seo-field-value">' + esc(a.seo.metaTitle) + '</div></div>';
        html += '<button class="btn btn-sm' + (s.copiedId===seo1?' copied-btn':'') + '" onclick="doCopyText(\'' + seo1 + '\',document.getElementById(\'seo-t\').value)">' + (s.copiedId===seo1?'&#10003;':'Copy') + '</button>';
        html += '<input type="hidden" id="seo-t" value="' + esc(a.seo.metaTitle) + '"/></div>';
        html += '<div class="seo-field"><div style="flex:1"><div class="seo-field-label">Meta Description</div><div class="seo-field-value">' + esc(a.seo.metaDesc) + '</div></div>';
        html += '<button class="btn btn-sm' + (s.copiedId===seo2?' copied-btn':'') + '" onclick="doCopyText(\'' + seo2 + '\',document.getElementById(\'seo-d\').value)">' + (s.copiedId===seo2?'&#10003;':'Copy') + '</button>';
        html += '<input type="hidden" id="seo-d" value="' + esc(a.seo.metaDesc) + '"/></div>';
        html += '<div class="seo-field"><div style="flex:1"><div class="seo-field-label">Keywords</div><div class="seo-keywords">';
        for (var ki=0; ki < a.seo.keywords.length; ki++) {
          html += '<span class="seo-kw">' + esc(a.seo.keywords[ki]) + '</span>';
        }
        html += '</div></div>';
        var kwText = a.seo.keywords.join(', ');
        html += '<button class="btn btn-sm' + (s.copiedId===seo3?' copied-btn':'') + '" onclick="doCopyText(\'' + seo3 + '\',document.getElementById(\'seo-k\').value)">' + (s.copiedId===seo3?'&#10003;':'Copy') + '</button>';
        html += '<input type="hidden" id="seo-k" value="' + esc(kwText) + '"/></div>';
        html += '</div>';
      }
      html += '</div>';
    }

    // PROMPT PANEL
    if (a.prompt) {
      html += '<div class="prompt-panel">';
      html += '<button class="prompt-toggle" onclick="togglePrompt()">&#128269; View prompt sent to Gemini ' + (s.promptOpen?'&#9650;':'&#9660;') + '</button>';
      if (s.promptOpen) {
        html += '<div class="prompt-content">' + esc(a.prompt) + '</div>';
      }
      html += '</div>';
    }
  }

  // HISTORY
  if (s.view === 'history') {
    html += '<div style="margin-bottom:24px">';
    html += '<h2 style="font-size:26px;font-weight:700;margin-bottom:4px">Article History</h2>';
    html += '<p style="font-size:13px;color:var(--muted)">' + s.history.length + ' articles saved locally</p>';
    html += '</div>';
    if (s.history.length === 0) {
      html += '<div class="history-empty">';
      html += '<p style="font-size:32px;margin-bottom:10px">&#129387;</p>';
      html += '<p>No articles yet.</p>';
      html += '<button class="btn btn-primary" style="margin-top:16px" onclick="setView(\'create\')">Create First Article</button>';
      html += '</div>';
    } else {
      for (var hi=0; hi < s.history.length; hi++) {
        var entry = s.history[hi];
        html += '<div class="history-item" onclick="loadHistoryArticle(' + entry.id + ')">';
        html += '<div class="history-item-title">' + esc(entry.title) + '</div>';
        html += '<div class="history-item-meta">';
        html += '<span>' + esc(entry.date) + '</span>';
        html += '<span>' + esc(entry.tone) + '</span>';
        html += '<span>' + entry.wordCount + 'w</span>';
        var entryTags = entry.tags || [];
        for (var eti=0; eti < entryTags.length; eti++) {
          html += '<span style="color:var(--accent)">' + esc(entryTags[eti]) + '</span>';
        }
        html += '</div></div>';
      }
    }
  }

  document.getElementById('main-area').innerHTML = html;
}

render();
</script>
</body>
</html>
