<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Claude-MangoPress – Modern Acre Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0f;
  --surface:#18181b;
  --surface2:#222226;
  --border:#2e2e34;
  --accent:#f5c842;
  --accent2:#e6a800;
  --text:#f0efe8;
  --muted:#8a8a94;
  --danger:#e24b4a;
  --success:#1D9E75;
  --radius:12px;
  --radius-sm:8px;
  --font-body:'DM Sans',sans-serif;
  --font-display:'DM Serif Display',serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6;min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(14,14,15,0.92);backdrop-filter:blur(12px)}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;font-family:var(--font-display);font-size:22px;color:var(--text)}
.logo span{font-size:26px}
.header-actions{display:flex;align-items:center;gap:12px}
.btn{padding:8px 18px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text);font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s}
.btn:hover{background:var(--surface2);border-color:var(--muted)}
.btn-primary{background:var(--accent);color:#0e0e0f;border-color:var(--accent);font-weight:600}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-sm{padding:6px 14px;font-size:12px}
.badge{background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:20px;font-size:11px;color:var(--muted)}

/* LAYOUT */
main{max-width:900px;margin:0 auto;padding:40px 24px 80px}

/* HERO */
.hero{text-align:center;margin-bottom:48px}
.hero h1{font-family:var(--font-display);font-size:clamp(32px,5vw,52px);line-height:1.15;margin-bottom:12px;color:var(--text)}
.hero h1 em{color:var(--accent);font-style:italic}
.hero p{color:var(--muted);font-size:15px;max-width:480px;margin:0 auto}

/* FORM CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px}
.card+.card{margin-top:20px}

.section-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.field{margin-bottom:20px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);font-size:14px;padding:10px 14px;outline:none;transition:border-color 0.15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:90px;line-height:1.5}
.field select option{background:var(--surface2)}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:600px){.grid-2,.grid-3{grid-template-columns:1fr}}

/* PILL SELECTOR */
.pill-group{display:flex;flex-wrap:wrap;gap:8px}
.pill{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font-body);font-size:13px;cursor:pointer;transition:all 0.15s}
.pill:hover{border-color:var(--muted);color:var(--text)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#0e0e0f;font-weight:600}

/* WORD COUNT */
.wc-group{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.wc-btn{padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:all 0.15s}
.wc-btn:hover{border-color:var(--muted);color:var(--text)}
.wc-btn.active{background:var(--surface2);border-color:var(--accent);color:var(--accent)}

/* TEMPLATES */
.template-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.template-row:last-child{border-bottom:none}
.template-name{flex:1;font-size:13px;color:var(--text)}
.template-meta{font-size:11px;color:var(--muted)}

/* GENERATE BTN */
.generate-wrap{margin-top:28px;display:flex;gap:12px;align-items:center}
.generate-btn{flex:1;padding:14px;background:var(--accent);color:#0e0e0f;border:none;border-radius:var(--radius-sm);font-family:var(--font-display);font-size:18px;font-weight:400;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:10px}
.generate-btn:hover{background:var(--accent2);transform:translateY(-1px)}
.generate-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(14,14,15,0.9);backdrop-filter:blur(8px);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-title{font-family:var(--font-display);font-size:26px;color:var(--text)}
.loading-status{font-size:14px;color:var(--muted);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ARTICLE RESULT */
.result-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.result-title{font-family:var(--font-display);font-size:clamp(22px,3vw,32px);line-height:1.2;color:var(--text);flex:1}
.result-actions{display:flex;gap:8px;flex-wrap:wrap}

.article-body{line-height:1.8;color:var(--text)}
.article-body h2{font-family:var(--font-display);font-size:22px;margin:28px 0 12px;color:var(--text)}
.article-body h3{font-size:17px;font-weight:600;margin:20px 0 8px;color:var(--text)}
.article-body p{margin-bottom:14px;color:#c8c8d0}
.article-body ul,.article-body ol{padding-left:24px;margin-bottom:14px;color:#c8c8d0}
.article-body li{margin-bottom:6px}
.article-body blockquote{border-left:3px solid var(--accent);padding:12px 16px;margin:20px 0;background:var(--surface2);border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-style:italic;color:var(--muted)}

/* BLOCK WITH COPY */
.block-wrap{position:relative}
.block-copy{position:absolute;top:8px;right:8px;padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--muted);cursor:pointer;opacity:0;transition:opacity 0.15s}
.block-wrap:hover .block-copy{opacity:1}
.block-copy:hover{color:var(--text)}
.block-copy.copied{color:var(--success);border-color:var(--success)}

/* SEO BLOCK */
.seo-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:24px}
.seo-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.seo-toggle h3{font-size:13px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted)}
.seo-content{margin-top:16px;display:grid;gap:12px}
.seo-field{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.seo-field-label{font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.06em}
.seo-field-value{font-size:13px;color:var(--text);flex:1}
.seo-keywords{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.seo-kw{background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:20px;font-size:12px;color:var(--accent)}

/* PLATFORM REFORMAT */
.reformat-bar{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0;padding:16px;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border)}
.reformat-label{font-size:12px;color:var(--muted);align-self:center;margin-right:4px}

/* PROMPT PANEL */
.prompt-panel{margin-top:20px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.prompt-toggle{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:12px;color:var(--muted)}
.prompt-content{padding:0 16px 16px;font-family:monospace;font-size:12px;color:var(--muted);line-height:1.6;white-space:pre-wrap;word-break:break-word}

/* HISTORY */
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;cursor:pointer;transition:border-color 0.15s}
.history-item:hover{border-color:var(--muted)}
.history-item-title{font-family:var(--font-display);font-size:18px;color:var(--text);margin-bottom:6px}
.history-item-meta{display:flex;gap:12px;font-size:12px;color:var(--muted)}
.history-empty{text-align:center;padding:60px 0;color:var(--muted)}

/* EXPORT */
.export-bar{display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}

/* VERSION BADGE */
.version-tag{font-size:11px;background:var(--surface2);border:1px solid var(--border);padding:3px 8px;border-radius:20px;color:var(--muted)}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--surface2);padding:4px;border-radius:var(--radius-sm);border:1px solid var(--border)}
.tab{padding:7px 18px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);border:none;background:transparent;font-family:var(--font-body);transition:all 0.15s}
.tab.active{background:var(--surface);color:var(--text);border:1px solid var(--border)}

/* ALERT */
.alert{padding:14px 18px;border-radius:var(--radius-sm);border-left:3px solid var(--danger);background:rgba(226,75,74,0.08);color:#f09595;font-size:13px;margin-bottom:20px}

/* TAGS */
.tag-group{display:flex;flex-wrap:wrap;gap:6px}
.tag{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font-body);font-size:12px;cursor:pointer;transition:all 0.15s}
.tag:hover{border-color:var(--muted);color:var(--text)}
.tag.active{background:var(--surface2);border-color:var(--accent);color:var(--accent)}

/* DIVIDER */
.divider{border:none;border-top:1px solid var(--border);margin:24px 0}
</style>
</head>
<body>

<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useRef, useCallback } = React;

const FIRM_CONTEXT = `You are a professional content writer for Modern Acre Studio PLLC, an architecture and consulting firm based in Richmond, Texas. The firm handles residential and commercial projects in the Houston metro area. Tailor all articles to reflect AEC industry expertise, Houston/Texas market context, and a licensed architect's perspective. The owner is a licensed architect with 10+ years of experience.`;

const TONES = ['Professional','Conversational','Technical','LinkedIn-Optimized'];
const WORD_COUNTS = [300,600,1200,2000];
const PROJECT_TAGS = ['Permitting','Custom Home','Commercial','Code Research','Business Dev','General AEC'];
const PLATFORMS = ['LinkedIn Post','Blog Article','Instagram Caption','Email Newsletter'];

const DEFAULT_FORM = {
  topic:'',
  audience:'',
  tone:'Professional',
  wordCount:600,
  tags:[],
  firmVoice:true,
};

// ── GEMINI API ──────────────────────────────────────────────────────────────
async function callGemini(apiKey, systemPrompt, userPrompt, temperature=0.8) {
  const body = {
    contents:[{role:'user',parts:[{text: userPrompt}]}],
    systemInstruction:{parts:[{text: systemPrompt}]},
    generationConfig:{temperature, maxOutputTokens:4096}
  };
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
    {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}
  );
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||'Gemini error')}
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

async function generateArticle(apiKey, form) {
  const toneMap = {
    'Professional':'formal, authoritative, and polished',
    'Conversational':'friendly, approachable, and easy to read',
    'Technical':'detailed, precise, with industry terminology',
    'LinkedIn-Optimized':'punchy, insight-driven, with a strong hook and short paragraphs optimized for LinkedIn feed'
  };
  const system = form.firmVoice ? FIRM_CONTEXT : 'You are a professional content writer.';
  const prompt = `Write a ${form.wordCount}-word article about: "${form.topic}"
Tone: ${toneMap[form.tone]}
Target Audience: ${form.audience || 'general professionals'}
${form.tags.length ? `Project Tags: ${form.tags.join(', ')}` : ''}

Format the article with:
- A compelling title (prefix with TITLE:)
- Clear H2 subheadings
- Short paragraphs
- Return plain text with markdown-style headings (## for H2, ### for H3)

After the article, add a separator line "---SEO---" then provide:
META_TITLE: (max 60 chars)
META_DESC: (max 155 chars)
KEYWORDS: keyword1, keyword2, keyword3, keyword4, keyword5

After that add "---PROMPT---" then output the exact prompt you used internally to generate this article.`;

  return await callGemini(apiKey, system, prompt);
}

async function reformatArticle(apiKey, articleText, platform) {
  const instructions = {
    'LinkedIn Post':'Rewrite as a LinkedIn post: strong hook first line, short punchy paragraphs, 150-300 words, end with a question or CTA, add 5 relevant hashtags at the end.',
    'Blog Article':'Rewrite as a long-form SEO blog article with intro, body sections with H2 headings, and conclusion. 600-800 words.',
    'Instagram Caption':'Rewrite as an Instagram caption: engaging first line, 80-150 words, conversational, end with a call to action, add 10 relevant hashtags.',
    'Email Newsletter':'Rewrite as an email newsletter: subject line first (prefix SUBJECT:), then greeting, body in short paragraphs, clear CTA button text at end.'
  };
  const system = FIRM_CONTEXT;
  const prompt = `${instructions[platform]}\n\nOriginal article:\n${articleText}`;
  return await callGemini(apiKey, system, prompt, 0.7);
}

// ── PARSE ARTICLE RESPONSE ──────────────────────────────────────────────────
function parseArticleResponse(raw) {
  const parts = raw.split('---SEO---');
  const articleRaw = parts[0].trim();
  const rest = parts[1] || '';
  const seoParts = rest.split('---PROMPT---');
  const seoRaw = seoParts[0].trim();
  const promptRaw = seoParts[1] ? seoParts[1].trim() : '';

  const titleMatch = articleRaw.match(/^TITLE:\s*(.+)/m);
  const title = titleMatch ? titleMatch[1].trim() : 'Untitled Article';
  const body = articleRaw.replace(/^TITLE:\s*.+\n?/m,'').trim();

  const metaTitleMatch = seoRaw.match(/META_TITLE:\s*(.+)/);
  const metaDescMatch = seoRaw.match(/META_DESC:\s*(.+)/);
  const keywordsMatch = seoRaw.match(/KEYWORDS:\s*(.+)/);

  return {
    title,
    body,
    seo:{
      metaTitle: metaTitleMatch ? metaTitleMatch[1].trim() : '',
      metaDesc: metaDescMatch ? metaDescMatch[1].trim() : '',
      keywords: keywordsMatch ? keywordsMatch[1].split(',').map(k=>k.trim()) : []
    },
    prompt: promptRaw,
    raw: articleRaw
  };
}

// ── RENDER ARTICLE BODY ─────────────────────────────────────────────────────
function ArticleBody({body, onCopy}) {
  const lines = body.split('\n');
  const elements = [];
  let i = 0;
  while(i < lines.length) {
    const line = lines[i];
    if(line.startsWith('## ')) {
      elements.push(<h2 key={i}>{line.slice(3)}</h2>);
    } else if(line.startsWith('### ')) {
      elements.push(<h3 key={i}>{line.slice(4)}</h3>);
    } else if(line.startsWith('> ')) {
      elements.push(<blockquote key={i}>{line.slice(2)}</blockquote>);
    } else if(line.trim()) {
      const text = line.trim();
      elements.push(
        <div key={i} className="block-wrap" style={{position:'relative'}}>
          <p>{text}</p>
          <button className="block-copy" onClick={()=>onCopy(text,i)}>Copy</button>
        </div>
      );
    }
    i++;
  }
  return <div className="article-body">{elements}</div>;
}

// ── LOCAL STORAGE ───────────────────────────────────────────────────────────
function loadTemplates() { try{return JSON.parse(localStorage.getItem('bp_templates')||'[]')}catch{return []} }
function saveTemplates(t) { localStorage.setItem('bp_templates',JSON.stringify(t)) }
function loadHistory() { try{return JSON.parse(localStorage.getItem('bp_history')||'[]')}catch{return []} }
function saveHistory(h) { localStorage.setItem('bp_history',JSON.stringify(h)) }

// ── COPY HELPER ─────────────────────────────────────────────────────────────
function useCopy() {
  const [copied, setCopied] = useState(null);
  const copy = useCallback((text, id='main') => {
    navigator.clipboard.writeText(text).then(()=>{
      setCopied(id);
      setTimeout(()=>setCopied(null), 1500);
    });
  },[]);
  return {copy, copied};
}

// ── EXPORT HELPERS ──────────────────────────────────────────────────────────
function exportMD(title, body) {
  const content = `# ${title}\n\n${body}`;
  const blob = new Blob([content],{type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${title.replace(/\s+/g,'-').toLowerCase()}.md`;
  a.click();
}

function exportTXT(title, body) {
  const content = `${title}\n${'='.repeat(title.length)}\n\n${body}`;
  const blob = new Blob([content],{type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${title.replace(/\s+/g,'-').toLowerCase()}.txt`;
  a.click();
}

// ── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState('create');
  const [apiKey, setApiKey] = useState(()=>localStorage.getItem('bp_apikey')||'');
  const [apiKeyInput, setApiKeyInput] = useState('');
  const [showApiSetup, setShowApiSetup] = useState(false);
  const [form, setForm] = useState(DEFAULT_FORM);
  const [isGenerating, setIsGenerating] = useState(false);
  const [genStatus, setGenStatus] = useState('');
  const [article, setArticle] = useState(null);
  const [reformatted, setReformatted] = useState(null);
  const [reformatPlatform, setReformatPlatform] = useState(null);
  const [isReformatting, setIsReformatting] = useState(false);
  const [seoOpen, setSeoOpen] = useState(false);
  const [promptOpen, setPromptOpen] = useState(false);
  const [templates, setTemplates] = useState(loadTemplates);
  const [templateName, setTemplateName] = useState('');
  const [history, setHistory] = useState(loadHistory);
  const {copy, copied} = useCopy();

  const hasApiKey = apiKey.trim().length > 10;

  function saveApiKey() {
    const k = apiKeyInput.trim();
    if(k){ localStorage.setItem('bp_apikey',k); setApiKey(k); setShowApiSetup(false); setApiKeyInput(''); }
  }

  function updateForm(key, val) { setForm(f=>({...f,[key]:val})) }

  function toggleTag(tag) {
    setForm(f=>({...f, tags: f.tags.includes(tag) ? f.tags.filter(t=>t!==tag) : [...f.tags,tag]}));
  }

  function saveTemplate() {
    if(!templateName.trim()) return;
    const t = {id:Date.now(), name:templateName.trim(), form:{...form}};
    const updated = [t,...templates];
    setTemplates(updated); saveTemplates(updated); setTemplateName('');
  }

  function loadTemplate(t) { setForm({...t.form}) }

  function deleteTemplate(id) {
    const updated = templates.filter(t=>t.id!==id);
    setTemplates(updated); saveTemplates(updated);
  }

  async function handleGenerate() {
    if(!hasApiKey){ setShowApiSetup(true); return; }
    if(!form.topic.trim()){ alert('Please enter a topic.'); return; }
    setIsGenerating(true);
    setGenStatus('Researching and writing your article...');
    setArticle(null); setReformatted(null); setReformatPlatform(null);
    try {
      setGenStatus('Generating content with Gemini Flash...');
      const raw = await generateArticle(apiKey, form);
      setGenStatus('Parsing and formatting...');
      const parsed = parseArticleResponse(raw);
      const entry = {
        id: Date.now(),
        title: parsed.title,
        tone: form.tone,
        tags: form.tags,
        wordCount: form.wordCount,
        date: new Date().toLocaleDateString(),
        article: parsed,
        form: {...form}
      };
      const updatedHistory = [entry,...history].slice(0,50);
      setHistory(updatedHistory); saveHistory(updatedHistory);
      setArticle(parsed);
      setView('create');
    } catch(e) {
      alert('Generation failed: ' + e.message);
    } finally {
      setIsGenerating(false); setGenStatus('');
    }
  }

  async function handleReformat(platform) {
    if(!article) return;
    setIsReformatting(true); setReformatPlatform(platform);
    try {
      const result = await reformatArticle(apiKey, article.raw, platform);
      setReformatted({platform, content:result});
    } catch(e) {
      alert('Reformat failed: ' + e.message);
    } finally { setIsReformatting(false); }
  }

  function loadHistoryArticle(entry) {
    setArticle(entry.article);
    setForm(entry.form||DEFAULT_FORM);
    setReformatted(null);
    setView('create');
  }

  return React.createElement(React.Fragment, null,
    // HEADER
    React.createElement('header', null,
      React.createElement('div', {className:'logo', onClick:()=>{setView('create');setArticle(null)}},
        React.createElement('span', null, '🥭'),
        'MangoPress'
      ),
      React.createElement('div', {className:'header-actions'},
        React.createElement('div', {className:'tabs'},
          React.createElement('button', {className:`tab ${view==='create'?'active':''}`, onClick:()=>setView('create')}, 'Create'),
          React.createElement('button', {className:`tab ${view==='history'?'active':''}`, onClick:()=>setView('history')}, `History (${history.length})`)
        ),
        hasApiKey
          ? React.createElement('button', {className:'btn btn-sm', onClick:()=>{if(confirm('Remove API key?')){localStorage.removeItem('bp_apikey');setApiKey('');}}}, '🔑 Key saved')
          : React.createElement('button', {className:'btn btn-primary btn-sm', onClick:()=>setShowApiSetup(true)}, 'Add API Key'),
        React.createElement('span', {className:'badge'}, 'Gemini Flash')
      )
    ),

    // LOADING OVERLAY
    isGenerating && React.createElement('div', {className:'loading-overlay'},
      React.createElement('div', {className:'spinner'}),
      React.createElement('h2', {className:'loading-title'}, 'Writing Article'),
      React.createElement('p', {className:'loading-status'}, genStatus)
    ),

    React.createElement('main', null,

      // API KEY SETUP
      showApiSetup && React.createElement('div', {className:'card', style:{marginBottom:24}},
        React.createElement('div', {className:'section-label'}, 'Gemini API Key Setup'),
        React.createElement('p', {style:{fontSize:13,color:'var(--muted)',marginBottom:16}},
          'Get your free key at ',
          React.createElement('a', {href:'https://aistudio.google.com/apikey', target:'_blank'}, 'aistudio.google.com/apikey'),
          '. Free tier = 1,500 requests/day.'
        ),
        React.createElement('div', {style:{display:'flex',gap:10}},
          React.createElement('input', {
            type:'password', placeholder:'AIza...',
            value:apiKeyInput, onChange:e=>setApiKeyInput(e.target.value),
            style:{flex:1,background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',padding:'10px 14px',fontSize:14,outline:'none'}
          }),
          React.createElement('button', {className:'btn btn-primary', onClick:saveApiKey}, 'Save'),
          React.createElement('button', {className:'btn', onClick:()=>setShowApiSetup(false)}, 'Cancel')
        )
      ),

      // CREATE VIEW
      view === 'create' && !article && React.createElement(React.Fragment, null,
        React.createElement('div', {className:'hero'},
          React.createElement('h1', null, 'Write articles that ', React.createElement('em', null, 'actually'), ' sound like you'),
          React.createElement('p', null, 'Powered by Gemini Flash. Pre-loaded with Modern Acre Studio context.')
        ),

        // MAIN FORM
        React.createElement('div', {className:'card'},
          React.createElement('div', {className:'section-label'}, 'Article Topic'),
          React.createElement('div', {className:'field'},
            React.createElement('label', null, 'What do you want to write about?'),
            React.createElement('textarea', {
              placeholder:'e.g. Why Houston homeowners should get a site plan before buying land...',
              value:form.topic, onChange:e=>updateForm('topic',e.target.value)
            })
          ),
          React.createElement('div', {className:'grid-2'},
            React.createElement('div', {className:'field'},
              React.createElement('label', null, 'Target Audience'),
              React.createElement('input', {
                type:'text', placeholder:'e.g. homeowners, contractors, developers',
                value:form.audience, onChange:e=>updateForm('audience',e.target.value)
              })
            ),
            React.createElement('div', {className:'field'},
              React.createElement('label', null, 'Firm Voice (Modern Acre Studio)'),
              React.createElement('div', {style:{display:'flex',alignItems:'center',gap:10,paddingTop:8}},
                React.createElement('input', {
                  type:'checkbox', id:'firmvoice', checked:form.firmVoice,
                  onChange:e=>updateForm('firmVoice',e.target.checked),
                  style:{width:16,height:16,accentColor:'var(--accent)'}
                }),
                React.createElement('label', {htmlFor:'firmvoice',style:{fontSize:13,color:'var(--muted)',cursor:'pointer'}}, 'Inject firm context into every prompt')
              )
            )
          ),

          React.createElement('hr', {className:'divider'}),
          React.createElement('div', {className:'section-label'}, 'Tone & Format'),
          React.createElement('div', {className:'field'},
            React.createElement('label', null, 'Tone / Voice'),
            React.createElement('div', {className:'pill-group'},
              TONES.map(t=>React.createElement('button', {
                key:t, className:`pill ${form.tone===t?'active':''}`,
                onClick:()=>updateForm('tone',t)
              }, t))
            )
          ),
          React.createElement('div', {className:'field'},
            React.createElement('label', null, 'Word Count'),
            React.createElement('div', {className:'wc-group'},
              WORD_COUNTS.map(w=>React.createElement('button', {
                key:w, className:`wc-btn ${form.wordCount===w?'active':''}`,
                onClick:()=>updateForm('wordCount',w)
              }, `${w} words`))
            )
          ),
          React.createElement('div', {className:'field'},
            React.createElement('label', null, 'Project Tags (optional)'),
            React.createElement('div', {className:'tag-group'},
              PROJECT_TAGS.map(tag=>React.createElement('button', {
                key:tag, className:`tag ${form.tags.includes(tag)?'active':''}`,
                onClick:()=>toggleTag(tag)
              }, tag))
            )
          ),

          React.createElement('div', {className:'generate-wrap'},
            React.createElement('button', {
              className:'generate-btn', onClick:handleGenerate,
              disabled:isGenerating||!form.topic.trim()
            }, '🥭 Generate Article')
          )
        ),

        // TEMPLATES
        React.createElement('div', {className:'card', style:{marginTop:16}},
          React.createElement('div', {className:'section-label'}, 'Saved Templates'),
          templates.length === 0
            ? React.createElement('p', {style:{fontSize:13,color:'var(--muted)',marginBottom:16}}, 'No templates saved yet. Fill out the form above and save it as a template.')
            : templates.map(t=>React.createElement('div', {key:t.id, className:'template-row'},
                React.createElement('span', {className:'template-name'}, t.name),
                React.createElement('span', {className:'template-meta'}, `${t.form.tone} · ${t.form.wordCount}w`),
                React.createElement('button', {className:'btn btn-sm', onClick:()=>loadTemplate(t)}, 'Load'),
                React.createElement('button', {className:'btn btn-sm', style:{color:'var(--danger)',borderColor:'transparent'}, onClick:()=>deleteTemplate(t.id)}, '✕')
              )),
          React.createElement('div', {style:{display:'flex',gap:10,marginTop:16}},
            React.createElement('input', {
              type:'text', placeholder:'Template name...',
              value:templateName, onChange:e=>setTemplateName(e.target.value),
              style:{flex:1,background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',padding:'8px 12px',fontSize:13,outline:'none'}
            }),
            React.createElement('button', {className:'btn btn-primary btn-sm', onClick:saveTemplate}, 'Save Template')
          )
        )
      ),

      // ARTICLE RESULT
      view === 'create' && article && React.createElement(React.Fragment, null,
        React.createElement('div', {className:'result-header'},
          React.createElement('div', null,
            React.createElement('div', {style:{display:'flex',alignItems:'center',gap:10,marginBottom:8}},
              React.createElement('span', {className:'version-tag'}, form.tone),
              React.createElement('span', {className:'version-tag'}, `${form.wordCount}w`),
              ...form.tags.map(tag=>React.createElement('span', {key:tag, className:'version-tag', style:{color:'var(--accent)',borderColor:'var(--accent)'}}, tag))
            ),
            React.createElement('h1', {className:'result-title'}, article.title)
          ),
          React.createElement('div', {className:'result-actions'},
            React.createElement('button', {
              className:'btn',
              onClick:()=>copy(article.raw,'full'),
              style:copied==='full'?{color:'var(--success)',borderColor:'var(--success)'}:{}
            }, copied==='full'?'Copied!':'Copy All'),
            React.createElement('button', {className:'btn btn-primary', onClick:()=>{setArticle(null);setReformatted(null)}}, '+ New Article')
          )
        ),

        // REFORMAT BAR
        React.createElement('div', {className:'reformat-bar'},
          React.createElement('span', {className:'reformat-label'}, 'Reformat for:'),
          PLATFORMS.map(p=>React.createElement('button', {
            key:p, className:`btn btn-sm ${reformatPlatform===p?'btn-primary':''}`,
            onClick:()=>handleReformat(p), disabled:isReformatting
          }, isReformatting&&reformatPlatform===p?'Reformatting...':p))
        ),

        // REFORMATTED CONTENT
        reformatted && React.createElement('div', {className:'card', style:{marginBottom:20}},
          React.createElement('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
            React.createElement('div', {className:'section-label'}, `Reformatted: ${reformatted.platform}`),
            React.createElement('div', {style:{display:'flex',gap:8}},
              React.createElement('button', {
                className:'btn btn-sm',
                onClick:()=>copy(reformatted.content,'reformat'),
                style:copied==='reformat'?{color:'var(--success)'}:{}
              }, copied==='reformat'?'Copied!':'Copy'),
              React.createElement('button', {className:'btn btn-sm', onClick:()=>setReformatted(null)}, '✕')
            )
          ),
          React.createElement('div', {style:{fontSize:14,lineHeight:1.7,color:'#c8c8d0',whiteSpace:'pre-wrap'}}, reformatted.content)
        ),

        // ARTICLE BODY
        React.createElement('div', {className:'card'},
          React.createElement(ArticleBody, {
            body:article.body,
            onCopy:(text,id)=>copy(text,`block-${id}`)
          }),
          React.createElement('div', {className:'export-bar'},
            React.createElement('button', {className:'btn btn-sm', onClick:()=>exportMD(article.title,article.body)}, '↓ Download .md'),
            React.createElement('button', {className:'btn btn-sm', onClick:()=>exportTXT(article.title,article.body)}, '↓ Download .txt'),
            React.createElement('button', {
              className:'btn btn-sm',
              onClick:()=>copy(`${article.title}\n\n${article.body}`,'full2'),
              style:copied==='full2'?{color:'var(--success)'}:{}
            }, copied==='full2'?'Copied!':'Copy Article')
          )
        ),

        // SEO BLOCK
        article.seo && (article.seo.metaTitle||article.seo.keywords.length>0) && React.createElement('div', {className:'seo-block'},
          React.createElement('div', {className:'seo-toggle', onClick:()=>setSeoOpen(o=>!o)},
            React.createElement('h3', null, '⟨/⟩ SEO Metadata'),
            React.createElement('span', {style:{fontSize:12,color:'var(--muted)'}}, seoOpen?'Hide ▲':'Show ▼')
          ),
          seoOpen && React.createElement('div', {className:'seo-content'},
            React.createElement('div', {className:'seo-field'},
              React.createElement('div', {style:{flex:1}},
                React.createElement('div', {className:'seo-field-label'}, 'Meta Title'),
                React.createElement('div', {className:'seo-field-value'}, article.seo.metaTitle)
              ),
              React.createElement('button', {className:'btn btn-sm', onClick:()=>copy(article.seo.metaTitle,'seo-title'), style:copied==='seo-title'?{color:'var(--success)'}:{}}, copied==='seo-title'?'✓':'Copy')
            ),
            React.createElement('div', {className:'seo-field'},
              React.createElement('div', {style:{flex:1}},
                React.createElement('div', {className:'seo-field-label'}, 'Meta Description'),
                React.createElement('div', {className:'seo-field-value'}, article.seo.metaDesc)
              ),
              React.createElement('button', {className:'btn btn-sm', onClick:()=>copy(article.seo.metaDesc,'seo-desc'), style:copied==='seo-desc'?{color:'var(--success)'}:{}}, copied==='seo-desc'?'✓':'Copy')
            ),
            React.createElement('div', {className:'seo-field'},
              React.createElement('div', {style:{flex:1}},
                React.createElement('div', {className:'seo-field-label'}, 'Focus Keywords'),
                React.createElement('div', {className:'seo-keywords'},
                  article.seo.keywords.map((k,i)=>React.createElement('span', {key:i, className:'seo-kw'}, k))
                )
              ),
              React.createElement('button', {className:'btn btn-sm', onClick:()=>copy(article.seo.keywords.join(', '),'seo-kw'), style:copied==='seo-kw'?{color:'var(--success)'}:{}}, copied==='seo-kw'?'✓':'Copy')
            )
          )
        ),

        // PROMPT PANEL
        article.prompt && React.createElement('div', {className:'prompt-panel'},
          React.createElement('div', {className:'prompt-toggle', onClick:()=>setPromptOpen(o=>!o)},
            React.createElement('span', null, '🔍 View prompt sent to Gemini'),
            React.createElement('span', null, promptOpen?'▲':'▼')
          ),
          promptOpen && React.createElement('div', {className:'prompt-content'}, article.prompt)
        )
      ),

      // HISTORY VIEW
      view === 'history' && React.createElement(React.Fragment, null,
        React.createElement('div', {style:{marginBottom:24}},
          React.createElement('h2', {style:{fontFamily:'var(--font-display)',fontSize:28,marginBottom:4}}, 'Article History'),
          React.createElement('p', {style:{fontSize:13,color:'var(--muted)'}}, `${history.length} articles saved locally`)
        ),
        history.length === 0
          ? React.createElement('div', {className:'history-empty'},
              React.createElement('p', {style:{fontSize:18,marginBottom:8}}, '🥭'),
              React.createElement('p', null, 'No articles generated yet.'),
              React.createElement('button', {className:'btn btn-primary', style:{marginTop:16}, onClick:()=>setView('create')}, 'Create First Article')
            )
          : history.map(entry=>React.createElement('div', {key:entry.id, className:'history-item', onClick:()=>loadHistoryArticle(entry)},
              React.createElement('div', {className:'history-item-title'}, entry.title),
              React.createElement('div', {className:'history-item-meta'},
                React.createElement('span', null, entry.date),
                React.createElement('span', null, entry.tone),
                React.createElement('span', null, `${entry.wordCount}w`),
                ...( (entry.tags||[]).map(tag=>React.createElement('span', {key:tag, style:{color:'var(--accent)'}}, tag)) )
              )
            ))
      )
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
